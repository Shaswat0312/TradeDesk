services:
  postgres:
    image: postgres:15
    container_name: tradedesk_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tradedesk_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  pgdata: